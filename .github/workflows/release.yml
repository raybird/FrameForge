name: Release scene-mcp

# 打 v* tag 即發佈：建置自包單檔，掛到 GitHub Release 供 install.sh 下載。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要建立的 release tag（例：v0.1.0）'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/scene-mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Build standalone bundle
        run: npm run build

      - name: Stage artifact（bin 名稱 = install.sh 下載名）
        run: cp dist/server.js frameforge-scene-mcp

      - name: Create / update release and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" frameforge-scene-mcp --clobber
          else
            gh release create "$TAG" frameforge-scene-mcp \
              --title "scene-mcp $TAG" \
              --generate-notes
          fi

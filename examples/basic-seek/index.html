<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FrameForge — basic seek demo</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0b0b0e;
        color: #e6e6ea;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 16px;
      }
      h1 { font-size: 16px; font-weight: 600; margin: 0; opacity: 0.8; }
      #stage { border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,.5); }
      .controls {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 800px;
        max-width: 100%;
      }
      .controls button, .controls select {
        background: #1c1c22;
        color: #e6e6ea;
        border: 1px solid #33333a;
        border-radius: 6px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 14px;
      }
      #scrubber { flex: 1; }
      #time { font-variant-numeric: tabular-nums; min-width: 110px; text-align: right; opacity: 0.85; }
      .hint { font-size: 12px; opacity: 0.5; max-width: 800px; text-align: center; }
    </style>
  </head>
  <body>
    <h1>FrameForge — 錄製互動 → 倒帶 → 完美重播（命脈①＋②）</h1>
    <canvas id="stage" width="800" height="500"></canvas>
    <div class="controls">
      <button id="play">▶ 播放</button>
      <select id="speed" title="速度">
        <option value="0.5">0.5×</option>
        <option value="1" selected>1×</option>
        <option value="2">2×</option>
      </select>
      <input id="scrubber" type="range" min="0" max="600" value="0" step="1" />
      <span id="time">tick 0 / 0.00s</span>
      <button id="reset" title="清除錄製，回到空白時間軸">⟲ 清除</button>
    </div>
    <p class="hint">
      <b>用法</b>：按 ▶ 播放後，用<b>方向鍵</b>駕駛黃色方塊（hero）四處移動——你的操作會被即時錄製。
      接著把<b>時間軸滑桿往回拖</b>，就會看到剛才的操作被逐 tick 完美重播；同一 tick 永遠同一畫面（決定性、零漂移）。
      旋轉的方塊是 authored 動畫，與互動同軌共存。
    </p>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
